spring.application.name=student-producer


server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/practical_kafka
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# kafka config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fee-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.niiran.engineering.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.niiran.engineering.event.StudentEvent
